  // Ensure normalizeEdges is defined before any use
  function normalizeEdges(edges) {
    if (!edges || !Array.isArray(edges)) return [];
    return edges.map(e => {
      const from = e.from || e.source || e.sourceId || e.source_id;
      const to = e.to || e.target || e.targetId || e.target_id;
      const label = e.label || e.type || "";
      const id = e.id || undefined;
      return { id, from, to, label, arrows: e.arrows || 'to' };
    }).filter(e => e.from && e.to);
  }

  // Deduplicate node array by id (preserve first occurrence)
  function dedupeNodes(nodes) {
    if (!nodes || !Array.isArray(nodes)) return [];
    const seen = new Set();
    const out = [];
    for (const n of nodes) {
      if (!n || !n.id) continue;
      if (seen.has(n.id)) continue;
      seen.add(n.id);
      out.push({ id: n.id, label: n.label, type: n.type });
    }
    return out;
  }

  // Deduplicate edges by id or by from/to/label
  function dedupeEdges(edges) {
    if (!edges || !Array.isArray(edges)) return [];
    const seen = new Set();
    const out = [];
    for (const e of edges) {
      if (!e || !e.from || !e.to) continue;
      const key = e.id || `${e.from}→${e.to}#${e.label || ''}`;
      if (seen.has(key)) continue;
      seen.add(key);
      out.push(e);
    }
    return out;
  }

  let network;
  let container = document.getElementById('network');
  let options = {
    nodes: {
      shape: 'dot',
      size: 10
    },
    edges: {
      arrows: 'to'
    },
    physics: {
      stabilization: true,
      stabilization: { iterations: 200 }
    }
  };

  // Filter and update graph
  function applyFilters() {
    const hideInit = document.getElementById('hideInit').checked;
    const onlyConnected = document.getElementById('onlyConnected').checked;
    const onlyFiles = document.getElementById('onlyFiles').checked;

    // Filter nodes (deduplicated)
    let filteredNodes = dedupeNodes(rawNodes).filter(node => {
      // Rule 1: Hide __init__.py if checked
      if (hideInit && node.label && node.label.includes('__init__')) {
        return false;
      }
      // Rule 3: Only file nodes if checked
      if (onlyFiles && node.type !== 'file') {
        return false;
      }
      return true;
    });

    // Rule 2: Only connected nodes if checked
    if (onlyConnected) {
      const connectedNodeIds = new Set();
      dedupeEdges(normalizeEdges(rawEdges)).forEach(edge => {
        connectedNodeIds.add(edge.from);
        connectedNodeIds.add(edge.to);
      });
      filteredNodes = filteredNodes.filter(node => connectedNodeIds.has(node.id));
    }

    // Transform nodes for vis-network
    const visNodes = filteredNodes.map(n => ({
      id: n.id,
      label: n.label
    }));

    // Filter edges to only include those between visible nodes
    const visibleNodeIds = new Set(filteredNodes.map(n => n.id));
    const visEdges = dedupeEdges(normalizeEdges(rawEdges)).filter(e => 
      visibleNodeIds.has(e.from) && visibleNodeIds.has(e.to)
    );

    // Update network
    network.setData({
      nodes: new vis.DataSet(visNodes),
      edges: new vis.DataSet(visEdges)
    });
  }

  // Initialize network
  function initNetwork() {
    const visNodes = dedupeNodes(rawNodes).map(n => ({
      id: n.id,
      label: n.label
    }));
    try {
      const visEdges = dedupeEdges(normalizeEdges(rawEdges));

      console.log('Initializing network with', visNodes.length, 'nodes and', visEdges.length, 'edges');
      document.getElementById('status').innerText = `Nodes: ${visNodes.length}, Edges: ${visEdges.length}`;

      network = new vis.Network(container, {
        nodes: new vis.DataSet(visNodes),
        edges: new vis.DataSet(visEdges)
      }, options);
    } catch (err) {
      console.error('Error initializing network:', err);
      document.getElementById('status').innerText = 'Error initializing network: ' + err.message;
    }
  }

  // Setup event listeners
  document.getElementById('hideInit').addEventListener('change', applyFilters);
  document.getElementById('onlyConnected').addEventListener('change', applyFilters);
  document.getElementById('onlyFiles').addEventListener('change', applyFilters);

  // Initialize on load
  initNetwork();
